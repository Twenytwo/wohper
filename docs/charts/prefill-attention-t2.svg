<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1F1E1D">Batched attention (T2) - prefill pass, 23 positions, cold</text>
  <text x="380" y="46" text-anchor="middle" font-size="12" fill="#6E6B64">seconds per pass, lower is better · projection weights streamed once per pass instead of once per position</text>
  <!-- axis: 0..35 s, y = 340 - v*7.7 -->
  <line x1="70" y1="340" x2="720" y2="340" stroke="#B8B4AA" stroke-width="1"/>
  <line x1="70" y1="70" x2="70" y2="340" stroke="#B8B4AA" stroke-width="1"/>
  <g stroke="#EDEAE2" stroke-width="1">
    <line x1="70" y1="263" x2="720" y2="263"/>
    <line x1="70" y1="186" x2="720" y2="186"/>
    <line x1="70" y1="109" x2="720" y2="109"/>
  </g>
  <g font-size="11" fill="#6E6B64" text-anchor="end">
    <text x="62" y="344">0</text>
    <text x="62" y="267">10</text>
    <text x="62" y="190">20</text>
    <text x="62" y="113">30</text>
  </g>
  <!-- groups: phase1 total, o projection, q projection; before #8f9fb8, after #D97757 -->
  <!-- phase1: 32.4 -> h 249.5; 8.0 -> 61.6 -->
  <rect x="120" y="90.5" width="70" height="249.5" fill="#8f9fb8"/>
  <rect x="196" y="278.4" width="70" height="61.6" fill="#D97757"/>
  <!-- o: 18.7 -> 144; 2.8 -> 21.6 -->
  <rect x="330" y="196" width="70" height="144" fill="#8f9fb8"/>
  <rect x="406" y="318.4" width="70" height="21.6" fill="#D97757"/>
  <!-- q: 8.5 -> 65.4; 1.2 -> 9.2 -->
  <rect x="540" y="274.6" width="70" height="65.4" fill="#8f9fb8"/>
  <rect x="616" y="330.8" width="70" height="9.2" fill="#D97757"/>
  <g font-size="13" font-weight="600" fill="#1F1E1D" text-anchor="middle">
    <text x="155" y="82">32.4</text>
    <text x="231" y="270">8.0</text>
    <text x="365" y="188">18.7</text>
    <text x="441" y="310">2.8</text>
    <text x="575" y="266">8.5</text>
    <text x="651" y="322">1.2</text>
  </g>
  <g font-size="12" fill="#3d3b37" text-anchor="middle">
    <text x="193" y="362">attention phase, total</text>
    <text x="193" y="377" font-size="10" fill="#6E6B64">4.0x</text>
    <text x="403" y="362">o projection (92 MB/layer)</text>
    <text x="403" y="377" font-size="10" fill="#6E6B64">6.7x</text>
    <text x="613" y="362">q projection (41 MB/layer)</text>
    <text x="613" y="377" font-size="10" fill="#6E6B64">7.1x</text>
  </g>
  <!-- legend -->
  <rect x="80" y="55" width="12" height="12" fill="#8f9fb8"/>
  <text x="97" y="65" font-size="11" fill="#3d3b37">per-position (before)</text>
  <rect x="230" y="55" width="12" height="12" fill="#D97757"/>
  <text x="247" y="65" font-size="11" fill="#3d3b37">batched, bit-identical output (after)</text>
</svg>
