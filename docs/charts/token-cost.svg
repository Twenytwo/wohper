<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="760" height="380" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1F1E1D">Decode cost per token vs domain warmth</text>
  <text x="380" y="46" text-anchor="middle" font-size="12" fill="#6E6B64">seconds per token, greedy, draft chain K=2 · the gap is expert reads from NVMe and closes as the domain warms</text>
  <!-- axis 0..12 s: y = 330 - v*21.67 -->
  <line x1="70" y1="330" x2="720" y2="330" stroke="#B8B4AA" stroke-width="1"/>
  <line x1="70" y1="70" x2="70" y2="330" stroke="#B8B4AA" stroke-width="1"/>
  <g stroke="#EDEAE2" stroke-width="1">
    <line x1="70" y1="243.3" x2="720" y2="243.3"/>
    <line x1="70" y1="156.7" x2="720" y2="156.7"/>
    <line x1="70" y1="70" x2="720" y2="70"/>
  </g>
  <g font-size="11" fill="#6E6B64" text-anchor="end">
    <text x="62" y="334">0</text>
    <text x="62" y="247">4</text>
    <text x="62" y="161">8</text>
    <text x="62" y="74">12</text>
  </g>
  <!-- in-domain warm 3.5 -> h 75.8 -->
  <rect x="120" y="254.2" width="120" height="75.8" fill="#D97757"/>
  <text x="180" y="246" font-size="14" font-weight="600" fill="#1F1E1D" text-anchor="middle">3.1-3.8 s</text>
  <!-- fresh domain 6-10: bar to 8 with range whisker 6..10 -->
  <rect x="330" y="156.7" width="120" height="173.3" fill="#8f9fb8"/>
  <line x1="390" y1="113.3" x2="390" y2="200" stroke="#4a6fa5" stroke-width="2"/>
  <line x1="378" y1="113.3" x2="402" y2="113.3" stroke="#4a6fa5" stroke-width="2"/>
  <line x1="378" y1="200" x2="402" y2="200" stroke="#4a6fa5" stroke-width="2"/>
  <text x="390" y="105" font-size="14" font-weight="600" fill="#1F1E1D" text-anchor="middle">6-10 s</text>
  <!-- measured warming trend 11.5 -> 6.9 over 3 turns: small line chart inset as third group -->
  <g>
    <text x="600" y="105" font-size="12" fill="#3d3b37" text-anchor="middle">measured warming trend</text>
    <text x="600" y="120" font-size="10" fill="#6E6B64" text-anchor="middle">same fresh domain, 3 consecutive turns</text>
    <!-- points: 11.5 -> y=80.8... map onto same scale: 11.5->80.8, 8.9->137, 6.9->180.5 ; x 540,600,660 -->
    <polyline points="540,80.8 600,137.2 660,180.5" fill="none" stroke="#4a6fa5" stroke-width="2.5"/>
    <circle cx="540" cy="80.8" r="4" fill="#4a6fa5"/>
    <circle cx="600" cy="137.2" r="4" fill="#4a6fa5"/>
    <circle cx="660" cy="180.5" r="4" fill="#4a6fa5"/>
    <text x="540" y="70" font-size="11" fill="#3d3b37" text-anchor="middle">11.5</text>
    <text x="600" y="127" font-size="11" fill="#3d3b37" text-anchor="middle">8.9</text>
    <text x="668" y="172" font-size="11" fill="#3d3b37" text-anchor="middle">6.9</text>
  </g>
  <g font-size="12" fill="#3d3b37" text-anchor="middle">
    <text x="180" y="352">warm, in-domain</text>
    <text x="180" y="367" font-size="10" fill="#6E6B64">experts in page cache</text>
    <text x="390" y="352">fresh domain</text>
    <text x="390" y="367" font-size="10" fill="#6E6B64">experts read from NVMe</text>
    <text x="600" y="352">turn 1 → 2 → 3</text>
    <text x="600" y="367" font-size="10" fill="#6E6B64">page cache fills, cost falls</text>
  </g>
</svg>
