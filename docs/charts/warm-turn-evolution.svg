<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1F1E1D">Warm chat turn - same question, across optimizations</text>
  <text x="380" y="46" text-anchor="middle" font-size="12" fill="#6E6B64">seconds, lower is better · i7-10750H · 16 GB RAM · WD SN730 NVMe</text>
  <!-- axis -->
  <line x1="70" y1="340" x2="720" y2="340" stroke="#B8B4AA" stroke-width="1"/>
  <line x1="70" y1="70" x2="70" y2="340" stroke="#B8B4AA" stroke-width="1"/>
  <!-- gridlines: 0..600 s, y = 340 - s*0.45 -->
  <g stroke="#EDEAE2" stroke-width="1">
    <line x1="70" y1="250" x2="720" y2="250"/>
    <line x1="70" y1="160" x2="720" y2="160"/>
    <line x1="70" y1="70"  x2="720" y2="70"/>
  </g>
  <g font-size="11" fill="#6E6B64" text-anchor="end">
    <text x="62" y="344">0</text>
    <text x="62" y="254">200</text>
    <text x="62" y="164">400</text>
    <text x="62" y="74">600</text>
  </g>
  <!-- bars: width 90, gap; value v -> height v*0.45 -->
  <g>
    <rect x="100" y="97"  width="90" height="243" fill="#B8B4AA"/>
    <rect x="255" y="106.45" width="90" height="233.55" fill="#8f9fb8"/>
    <rect x="410" y="261.25" width="90" height="78.75" fill="#4a6fa5"/>
    <rect x="565" y="309.85" width="90" height="30.15" fill="#D97757"/>
  </g>
  <g font-size="14" font-weight="600" fill="#1F1E1D" text-anchor="middle">
    <text x="145" y="88">~540 s</text>
    <text x="300" y="98">519 s</text>
    <text x="455" y="253">175 s</text>
    <text x="610" y="301">67 s</text>
  </g>
  <g font-size="12" fill="#3d3b37" text-anchor="middle">
    <text x="145" y="362">project start</text>
    <text x="300" y="362">persistent server</text>
    <text x="300" y="377" font-size="10" fill="#6E6B64">warm caches (E2)</text>
    <text x="455" y="362">I/O surgery + KV reuse</text>
    <text x="455" y="377" font-size="10" fill="#6E6B64">ext4 volume, O_DIRECT, session cache (V2-V5)</text>
    <text x="610" y="362">experts pack</text>
    <text x="610" y="377" font-size="10" fill="#6E6B64">11k shards → 1 file (T1)</text>
  </g>
  <text x="720" y="395" text-anchor="end" font-size="10" fill="#B8B4AA">8.1x end to end - every step parity-gated</text>
</svg>
